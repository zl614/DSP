name: build-windows-exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      # Windows CI pipes stdout as cp1252; force UTF-8 so any non-ASCII
      # output during the build cannot kill the job with UnicodeEncodeError.
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo contents
        shell: pwsh
        run: |
          Write-Host "--- files in repo root ---"
          Get-ChildItem -Name

      - name: Check required files
        shell: pwsh
        run: |
          $required = @(
            "speedx_relay.py",
            "speedx_panel.spec",
            "requirements.txt",
            "fleet_splitter.html"
          )
          $missing = @()
          foreach ($f in $required) {
            if (-not (Test-Path $f)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Host "MISSING FILES:" -ForegroundColor Red
            $missing | ForEach-Object { Write-Host "  $_" }
            Write-Host ""
            Write-Host "Upload them to the repo root, then re-run."
            exit 1
          }
          Write-Host "All required files present."
          $pages = Get-ChildItem -Filter *.html -Name
          Write-Host "HTML pages found:"
          $pages | ForEach-Object { Write-Host "  $_" }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.10.0

      - name: Build exe
        run: pyinstaller --clean --noconfirm speedx_panel.spec

      - name: Assemble release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/SpeedX-Panel.exe release/
          Copy-Item *.html release/
          if (Test-Path graph_config.json) { Copy-Item graph_config.json release/ }
          Write-Host "--- release contents ---"
          Get-ChildItem release | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpeedX-Panel-windows
          path: release/
          retention-days: 30
